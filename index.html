<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장상 네트워크 추론 게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div id="app">
      <div class="card">
        <div class="topbar">
          <div>
            <h1>장상 네트워크 추론 게임</h1>
            <p class="muted">증상과 단서를 바탕으로 주 장부, 연계 장부, 관계, 병기를 추론하세요.</p>
          </div>
          <div>
            <p id="totalScore" class="badge">누적 점수: 0</p>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="topbar">
          <h2 id="questionNumber">1번</h2>
          <p id="difficulty" class="badge">하</p>
        </div>
        <p id="questionText">문항을 불러오는 중입니다.</p>
      </div>

      <div class="grid-2">
        <div class="card">
          <h3 class="section-title">증상</h3>
          <ul id="symptomsList"></ul>
        </div>

        <div class="card">
          <h3 class="section-title">추가 단서</h3>
          <ul id="extraCluesList"></ul>
        </div>
      </div>

      <div class="card">
        <h3 class="section-title">답안 입력</h3>

        <div class="form-grid">
          <div class="field">
            <label for="primaryOrgan">주 장부</label>
            <select id="primaryOrgan">
              <option value="">선택</option>
              <option value="심">심</option>
              <option value="간">간</option>
              <option value="비">비</option>
              <option value="폐">폐</option>
              <option value="신">신</option>
            </select>
          </div>

          <div class="field">
            <label for="secondaryOrgan">연계 장부</label>
            <select id="secondaryOrgan">
              <option value="">선택</option>
              <option value="없음">없음</option>
              <option value="심">심</option>
              <option value="간">간</option>
              <option value="비">비</option>
              <option value="폐">폐</option>
              <option value="신">신</option>
            </select>
          </div>

          <div class="field">
            <label for="relatedBowel">관련 부</label>
            <select id="relatedBowel">
              <option value="">선택</option>
              <option value="없음">없음</option>
              <option value="소장">소장</option>
              <option value="담">담</option>
              <option value="위">위</option>
              <option value="대장">대장</option>
              <option value="방광">방광</option>
              <option value="삼초">삼초</option>
            </select>
          </div>

          <div class="field">
            <label for="relation">관계</label>
            <select id="relation">
              <option value="">선택</option>
            </select>
          </div>

          <div class="field" style="grid-column: 1 / -1;">
            <label for="pattern">병기</label>
            <select id="pattern">
              <option value="">선택</option>
            </select>
          </div>

          <div class="field" style="grid-column: 1 / -1;">
            <label for="shortAnswer">짧은 서술</label>
            <textarea
              id="shortAnswer"
              rows="3"
              placeholder="근거를 한 줄로 적으세요. 예: 불면과 심계는 심, 허리 시림은 신을 시사하여 심신불교로 보았다."
            ></textarea>
          </div>
        </div>

        <div class="button-row">
          <button id="submitBtn" type="button">제출</button>
          <button id="nextBtn" type="button" style="display: none;">다음 문제</button>
          <button id="restartInlineBtn" type="button">처음부터 다시</button>
        </div>
      </div>

      <div class="card" id="resultBox" style="display: none;"></div>
    </div>

    <p class="footer-note">GitHub Pages에서 실행 중입니다.</p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const restartInlineBtn = document.getElementById("restartInlineBtn");
      if (restartInlineBtn) {
        restartInlineBtn.addEventListener("click", () => {
          const ok = confirm("진행 기록과 점수를 모두 초기화하시겠습니까?");
          if (!ok) return;

          localStorage.removeItem("jangsang_currentIndex");
          localStorage.removeItem("jangsang_totalScore");
          location.reload();
        });
      }
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
